{% extends 'base.html' %}

{% block content %}
<h2>인사기록 삭제 확인</h2>
<p><strong>{{ record.employee.name }}</strong>의 {{ record.year }}년 인사기록을 삭제하시겠습니까?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">삭제</button>
    <a href="{% url 'employee:detail' record.employee.pk %}" class="ml-10">취소</a>
</form>
{% endblock %}
